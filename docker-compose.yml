services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: notebook-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-notebook}
      POSTGRES_USER: ${POSTGRES_USER:-notebook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notebook}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - notebook-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-notebook} -d ${POSTGRES_DB:-notebook}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  notebook-postgres-data:
