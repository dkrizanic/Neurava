spring:
  application:
    name: notebook-api
  profiles:
    default: local
  mvc:
    problemdetails:
      enabled: true

server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax
        secure: ${APP_SESSION_COOKIE_SECURE:true}
  error:
    include-binding-errors: never
    include-exception: false
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  web-origin: ${APP_WEB_ORIGIN:http://localhost:5173}
  info:
    name: ${APP_NAME:Neurava API}
    version: ${APP_VERSION:0.0.1-SNAPSHOT}
