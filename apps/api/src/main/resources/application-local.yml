spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/notebook
    username: notebook
    password: notebook
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}

app:
  web-origin: ${APP_WEB_ORIGIN:http://localhost:5173}

server:
  servlet:
    session:
      cookie:
        secure: ${APP_SESSION_COOKIE_SECURE:false}
